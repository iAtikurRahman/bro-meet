server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Meeting routes -> serve meet.html
    location ~ ^/meet/ {
        try_files /meet.html =404;
    }

    # Default routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
